<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LỰA CHỌN CỦA LINH HỒN - IDLE RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0515;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-image: radial-gradient(ellipse at 20% 30%, #1a0f2a 0%, #04010a 100%);
            padding: 10px;
        }
        #game-container {
            background: linear-gradient(160deg, #1a1228, #0d0818);
            width: 780px;
            max-width: 100%;
            padding: 18px 20px 22px;
            border-radius: 40px;
            border: 2px solid #7a5aaa;
            box-shadow: 0 0 80px #4a2a7a66, inset 0 0 60px #2a1a3a33;
            color: #e4d8f0;
        }
        /* ===== HEADER ===== */
        #title {
            text-align: center;
            font-size: 2.4rem;
            font-weight: 900;
            color: #f0d060;
            text-shadow: 0 0 30px #8a6a2a, 0 0 60px #4a3a1a;
            letter-spacing: 3px;
            font-family: 'Times New Roman', serif;
        }
        #subtitle {
            text-align: center;
            color: #a090b0;
            font-size: 0.85rem;
            border-bottom: 1px solid #3a2a5a;
            padding-bottom: 10px;
            margin-bottom: 12px;
            font-style: italic;
        }
        /* ===== SCENE IMAGE ===== */
        #scene-image {
            width: 100%;
            height: 180px;
            background: #0a0a12;
            border-radius: 24px;
            border: 1px solid #3a2a6a;
            margin-bottom: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 50px #00000066;
            transition: background 0.4s;
            position: relative;
            overflow: hidden;
        }
        #scene-image .emoji-bg {
            text-shadow: 0 0 40px #000000cc;
            opacity: 0.9;
            z-index: 2;
        }
        #scene-image .img-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }
        /* ===== HERO BANNER ===== */
        #hero-banner {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 4px 12px;
            margin-bottom: 10px;
            scroll-behavior: smooth;
            border-bottom: 1px solid #2a1a4a;
        }
        #hero-banner::-webkit-scrollbar {
            height: 4px;
        }
        #hero-banner::-webkit-scrollbar-thumb {
            background: #4a2a7a;
            border-radius: 20px;
        }
        .hero-card {
            min-width: 70px;
            background: #0d081a;
            border-radius: 16px;
            padding: 8px 6px;
            text-align: center;
            border: 1px solid #3a2a5a;
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }
        .hero-card.active {
            border-color: #f0d060;
            box-shadow: 0 0 20px #f0d06044;
        }
        .hero-card .avatar {
            font-size: 2.2rem;
        }
        .hero-card .name {
            font-size: 0.6rem;
            color: #b0a8c8;
            margin-top: 2px;
            white-space: nowrap;
        }
        .hero-card .level {
            font-size: 0.55rem;
            color: #f0e070;
        }
        /* ===== STATS ===== */
        #stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            background: #0d081a;
            padding: 6px 14px;
            border-radius: 60px;
            border: 1px solid #3a2a5a;
            margin-bottom: 12px;
            font-size: 0.78rem;
            font-weight: 600;
            justify-content: space-around;
        }
        .stat-item {
            color: #b0a8c8;
        }
        .stat-item span {
            color: #f0e070;
        }
        .stat-bar {
            display: inline-block;
            width: 60px;
            height: 8px;
            background: #1a1a2a;
            border-radius: 20px;
            overflow: hidden;
            vertical-align: middle;
            margin-left: 4px;
            border: 1px solid #3a3a5a;
        }
        .stat-fill {
            height: 100%;
            width: 100%;
            transition: width 0.3s;
        }
        #hp-fill {
            background: #d05050;
        }
        #mp-fill {
            background: #5080d0;
        }
        #xp-fill {
            background: #d0b040;
        }
        /* ===== REWARD POPUP ===== */
        #reward-popup {
            background: #1a0f20;
            border: 2px solid #f0d060;
            border-radius: 20px;
            padding: 8px 14px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            color: #f0e070;
            display: none;
            animation: glow 0.7s ease;
            box-shadow: 0 0 30px #f0d06044;
            font-size: 0.9rem;
        }
        @keyframes glow {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        /* ===== STORY / BATTLE LOG ===== */
        #story-area {
            background: #08040e;
            border: 1px solid #2a1a4a;
            border-radius: 20px;
            padding: 12px 16px;
            min-height: 100px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 12px;
            color: #d0c8e0;
            box-shadow: inset 0 0 30px #00000066;
            scroll-behavior: smooth;
        }
        #story-area::-webkit-scrollbar {
            width: 5px;
        }
        #story-area::-webkit-scrollbar-thumb {
            background: #4a2a7a;
            border-radius: 20px;
        }
        .story-narrator {
            color: #c8c0d8;
        }
        .story-event {
            color: #f0c070;
        }
        .story-combat {
            color: #f07070;
        }
        .story-loot {
            color: #f0d060;
        }
        .story-info {
            color: #80c0f0;
        }
        /* ===== ACTIONS ===== */
        #action-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 4px;
        }
        .act-btn {
            background: #1a1228;
            border: 1px solid #4a3a6a;
            color: #d0c8e8;
            padding: 12px 4px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            box-shadow: 0 3px 0 #0a0612;
            line-height: 1.2;
        }
        .act-btn:hover {
            background: #2a1a3e;
            border-color: #7a5aaa;
            transform: scale(1.03);
        }
        .act-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .act-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(0.6);
        }
        .act-btn.special {
            border-color: #c09040;
            background: #2a1a0a;
        }
        .act-btn.danger {
            border-color: #c04040;
            background: #2a0a0a;
        }
        .act-btn.boss {
            border-color: #c040c0;
            background: #2a0a2a;
        }
        @media (max-width: 550px) {
            #action-panel {
                grid-template-columns: 1fr 1fr;
            }
            #title {
                font-size: 1.8rem;
            }
            #scene-image {
                height: 120px;
                font-size: 2.5rem;
            }
            #stats-row {
                font-size: 0.65rem;
                gap: 2px;
            }
            .stat-bar {
                width: 40px;
            }
            .hero-card {
                min-width: 55px;
                padding: 4px 4px;
            }
            .hero-card .avatar {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="title">⚔️ LỰA CHỌN CỦA LINH HỒN ⚔️</div>
        <div id="subtitle">— Idle RPG - Bảo vệ Cây Thế Giới —</div>

        <div id="scene-image">
            <span class="emoji-bg">🌳</span>
            <div class="img-overlay"></div>
        </div>

        <div id="hero-banner">
            <!-- Heroes will be dynamically rendered here -->
        </div>

        <div id="stats-row">
            <div class="stat-item">❤️ HP <span id="hp-text">100/100</span> <span class="stat-bar"><span class="stat-fill" id="hp-fill"></span></span></div>
            <div class="stat-item">🌀 MP <span id="mp-text">50/50</span> <span class="stat-bar"><span class="stat-fill" id="mp-fill"></span></span></div>
            <div class="stat-item">⭐ LV.<span id="level-text">1</span> <span class="stat-bar"><span class="stat-fill" id="xp-fill"></span></span></div>
            <div class="stat-item">🗡️ <span id="atk-text">10</span> 🛡️ <span id="def-text">4</span></div>
            <div class="stat-item">💰 <span id="gold-text">0</span></div>
        </div>

        <div id="reward-popup">🎁 PHẦN THƯỞNG!</div>

        <div id="story-area">
            <div class="story-narrator">🌳 Chào mừng Vị Cứu Tinh! Cây Thế Giới đang bị bóng tối bao phủ...</div>
        </div>

        <div id="action-panel">
            <button class="act-btn" id="btn-fight">⚔️ Chiến đấu</button>
            <button class="act-btn special" id="btn-summon">✨ Triệu hồi (100 vàng)</button>
            <button class="act-btn" id="btn-upgrade">⬆️ Nâng cấp (50 vàng)</button>
        </div>
    </div>

    <script>
        // ================================================================
        // SPIRIT WARS 2D STYLE - IDLE RPG
        // ================================================================
        (function() {
            // ---------- HERO TEMPLATES ----------
            const HERO_TEMPLATES = [
                { id: 'warrior', name: 'Chiến Binh', avatar: '⚔️', baseAtk: 12, baseDef: 6, hp: 80, cost: 0 },
                { id: 'mage', name: 'Pháp Sư', avatar: '🧙', baseAtk: 18, baseDef: 3, hp: 60, cost: 50 },
                { id: 'archer', name: 'Cung Thủ', avatar: '🏹', baseAtk: 15, baseDef: 4, hp: 70, cost: 40 },
                { id: 'paladin', name: 'Hiệp Sĩ', avatar: '🛡️', baseAtk: 10, baseDef: 9, hp: 100, cost: 60 },
                { id: 'assassin', name: 'Sát Thủ', avatar: '🗡️', baseAtk: 22, baseDef: 2, hp: 50, cost: 70 },
                { id: 'druid', name: 'Đức Sĩ', avatar: '🌿', baseAtk: 8, baseDef: 7, hp: 90, cost: 55 }
            ];

            // ---------- PLAYER ----------
            let player = {
                hp: 100,
                maxHp: 100,
                mp: 50,
                maxMp: 50,
                level: 1,
                xp: 0,
                xpNext: 40,
                atk: 10,
                def: 4,
                gold: 50,
                heroes: [],
                activeHeroIndex: 0,
                kills: 0,
                totalAtk: 10,
                totalDef: 4,
                totalHp: 100
            };

            // ---------- ENEMY ----------
            let enemy = null;
            let isFighting = false;
            let idleInterval = null;

            // DOM refs
            const storyArea = document.getElementById('story-area');
            const sceneImg = document.getElementById('scene-image');
            const heroBanner = document.getElementById('hero-banner');
            const rewardPopup = document.getElementById('reward-popup');
            const btnFight = document.getElementById('btn-fight');
            const btnSummon = document.getElementById('btn-summon');
            const btnUpgrade = document.getElementById('btn-upgrade');
            const hpText = document.getElementById('hp-text');
            const hpFill = document.getElementById('hp-fill');
            const mpText = document.getElementById('mp-text');
            const mpFill = document.getElementById('mp-fill');
            const levelText = document.getElementById('level-text');
            const atkText = document.getElementById('atk-text');
            const defText = document.getElementById('def-text');
            const goldText = document.getElementById('gold-text');

            // ---------- HELPERS ----------
            function log(msg, cls = 'story-narrator') {
                const div = document.createElement('div');
                div.className = cls;
                div.innerHTML = msg;
                storyArea.appendChild(div);
                storyArea.scrollTop = storyArea.scrollHeight;
                if (storyArea.children.length > 30) {
                    storyArea.removeChild(storyArea.firstChild);
                }
            }

            function updateUI() {
                const hpPct = (player.hp / player.maxHp) * 100;
                hpText.textContent = `${Math.floor(player.hp)}/${player.maxHp}`;
                hpFill.style.width = Math.min(100, Math.max(0, hpPct)) + '%';
                const mpPct = (player.mp / player.maxMp) * 100;
                mpText.textContent = `${Math.floor(player.mp)}/${player.maxMp}`;
                mpFill.style.width = Math.min(100, Math.max(0, mpPct)) + '%';
                const xpPct = (player.xp / player.xpNext) * 100;
                levelText.textContent = player.level;
                atkText.textContent = player.totalAtk;
                defText.textContent = player.totalDef;
                goldText.textContent = player.gold;
                // Update active hero stats
                updateHeroStats();
                renderHeroes();
            }

            function updateHeroStats() {
                let atk = 0,
                    def = 0,
                    hp = 0;
                player.heroes.forEach((h, idx) => {
                    const base = HERO_TEMPLATES.find(t => t.id === h.id);
                    if (base) {
                        const lvlBonus = h.level * 1.5;
                        atk += base.baseAtk + lvlBonus + (h.equipment ? h.equipment.atk || 0 : 0);
                        def += base.baseDef + lvlBonus * 0.8 + (h.equipment ? h.equipment.def || 0 : 0);
                        hp += base.hp + h.level * 4;
                    }
                });
                // Player base
                atk += player.atk;
                def += player.def;
                hp += player.maxHp;
                // Cap
                player.totalAtk = Math.floor(atk);
                player.totalDef = Math.floor(def);
                player.totalHp = Math.floor(hp);
                player.maxHp = Math.floor(hp);
                if (player.hp > player.maxHp) player.hp = player.maxHp;
            }

            // ---------- HERO MANAGEMENT ----------
            function renderHeroes() {
                heroBanner.innerHTML = '';
                player.heroes.forEach((hero, idx) => {
                    const base = HERO_TEMPLATES.find(t => t.id === hero.id);
                    const card = document.createElement('div');
                    card.className = `hero-card ${idx === player.activeHeroIndex ? 'active' : ''}`;
                    card.innerHTML = `
                    <div class="avatar">${base ? base.avatar : '🧑'}</div>
                    <div class="name">${hero.name || 'Anh Hùng'}</div>
                    <div class="level">LV${hero.level}</div>
                  `;
                    card.onclick = () => {
                        player.activeHeroIndex = idx;
                        renderHeroes();
                        log(`👉 Đã chọn ${hero.name || 'Anh Hùng'} làm chủ lực.`, 'story-info');
                    };
                    heroBanner.appendChild(card);
                });
                // Auto-scroll to active
                const activeEl = heroBanner.querySelector('.hero-card.active');
                if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            }

            function addHero(heroId) {
                const template = HERO_TEMPLATES.find(t => t.id === heroId);
                if (!template) return false;
                if (player.gold < template.cost) {
                    log(`⚠️ Không đủ vàng để triệu hồi ${template.name}! (cần ${template.cost} vàng)`, 'story-event');
                    return false;
                }
                player.gold -= template.cost;
                const newHero = {
                    id: template.id,
                    name: template.name,
                    level: 1,
                    equipment: null,
                    xp: 0,
                    xpNext: 30
                };
                player.heroes.push(newHero);
                player.activeHeroIndex = player.heroes.length - 1;
                log(`✨ <b>Triệu hồi thành công ${template.name}!</b>`, 'story-loot');
                updateUI();
                showReward(`✨ Triệu hồi ${template.name}!`);
                return true;
            }

            function upgradeHero() {
                if (player.heroes.length === 0) {
                    log('⚠️ Bạn chưa có anh hùng nào để nâng cấp!', 'story-event');
                    return;
                }
                if (player.gold < 50) {
                    log('⚠️ Cần 50 vàng để nâng cấp!', 'story-event');
                    return;
                }
                const hero = player.heroes[player.activeHeroIndex];
                if (!hero) return;
                player.gold -= 50;
                hero.level += 1;
                hero.xp = 0;
                hero.xpNext = Math.floor(hero.xpNext * 1.4) + 20;
                log(`⬆️ <b>${hero.name}</b> đã lên cấp ${hero.level}!`, 'story-loot');
                updateUI();
                showReward(`⬆️ ${hero.name} LV.${hero.level}`);
            }

            // ---------- COMBAT ----------
            function spawnEnemy() {
                const enemies = [
                    { name: 'Bóng Ma', hp: 30, atk: 6, def: 2, xp: 15, goldMin: 5, goldMax: 12, avatar: '👻' },
                    { name: 'Quỷ Nhỏ', hp: 40, atk: 9, def: 3, xp: 22, goldMin: 8, goldMax: 16, avatar: '👹' },
                    { name: 'Sói Đen', hp: 50, atk: 12, def: 4, xp: 30, goldMin: 12, goldMax: 22, avatar: '🐺' },
                    { name: 'Thây Ma', hp: 60, atk: 14, def: 6, xp: 38, goldMin: 15, goldMax: 28, avatar: '🧟' },
                    { name: 'Chiến Binh Bóng Tối', hp: 80, atk: 18, def: 8, xp: 50, goldMin: 20, goldMax: 35, avatar: '⚔️' },
                    { name: 'Rồng Con', hp: 100, atk: 22, def: 10, xp: 65, goldMin: 30, goldMax: 50, avatar: '🐉' },
                    { name: 'Boss Ác Mộng', hp: 150, atk: 30, def: 15, xp: 100, goldMin: 50, goldMax: 80, avatar: '💀' }
                ];
                // Scale with player level and kill count
                const lv = player.level;
                let pool = enemies;
                if (lv <= 2) pool = enemies.slice(0, 3);
                else if (lv <= 4) pool = enemies.slice(0, 5);
                else pool = enemies;
                const idx = Math.floor(Math.random() * pool.length);
                const template = pool[idx];
                const scale = 1 + (lv - 1) * 0.12 + (player.kills / 50) * 0.2;
                enemy = {
                    name: template.name,
                    hp: Math.floor(template.hp * scale),
                    maxHp: Math.floor(template.hp * scale),
                    atk: Math.floor(template.atk * scale),
                    def: Math.floor(template.def * scale),
                    xp: Math.floor(template.xp * scale),
                    goldMin: Math.floor(template.goldMin * scale),
                    goldMax: Math.floor(template.goldMax * scale),
                    avatar: template.avatar
                };
                // Scene image
                sceneImg.innerHTML = `<span class="emoji-bg" style="font-size:4rem;">${enemy.avatar}</span><div class="img-overlay"></div>`;
                log(`⚔️ <b>${enemy.name}</b> xuất hiện! (HP:${enemy.hp} | ATK:${enemy.atk})`, 'story-combat');
            }

            function fight() {
                if (isFighting) return;
                if (!enemy) {
                    spawnEnemy();
                    return;
                }
                if (player.heroes.length === 0) {
                    log('⚠️ Bạn cần có anh hùng để chiến đấu! Hãy triệu hồi trước.', 'story-event');
                    return;
                }
                isFighting = true;
                btnFight.disabled = true;
                btnSummon.disabled = true;
                btnUpgrade.disabled = true;

                // Player attack
                const hero = player.heroes[player.activeHeroIndex] || player.heroes[0];
                const heroTemplate = HERO_TEMPLATES.find(t => t.id === hero.id);
                const atkBonus = hero.level * 1.5 + (hero.equipment ? hero.equipment.atk || 0 : 0);
                let dmg = Math.max(2, player.totalAtk + atkBonus - Math.floor(enemy.def * 0.4) + Math.floor(Math.random() * 6) - 2);
                // Crit
                if (Math.random() < 0.15) {
                    dmg = Math.floor(dmg * 1.8);
                    log(`💥 <b>CHÍ MẠNG!</b>`, 'story-event');
                }
                enemy.hp -= dmg;
                log(`⚔️ ${hero.name || 'Bạn'} gây <b>${dmg}</b> sát thương.`, 'story-narrator');

                // Enemy death
                if (enemy.hp <= 0) {
                    enemy.hp = 0;
                    const goldGain = Math.floor(Math.random() * (enemy.goldMax - enemy.goldMin + 1)) + enemy.goldMin;
                    const xpGain = Math.floor(enemy.xp * (0.85 + Math.random() * 0.3));
                    player.gold += goldGain;
                    player.xp += xpGain;
                    player.kills++;
                    // Hero XP
                    hero.xp = (hero.xp || 0) + Math.floor(xpGain * 0.4);
                    if (hero.xp >= hero.xpNext) {
                        hero.level++;
                        hero.xp = 0;
                        hero.xpNext = Math.floor(hero.xpNext * 1.4) + 20;
                        log(`⬆️ <b>${hero.name}</b> lên cấp ${hero.level}!`, 'story-loot');
                    }
                    log(`💀 <b>${enemy.name}</b> bị hạ! +${xpGain} XP, +${goldGain} Vàng`, 'story-loot');
                    checkLevelUp();
                    showReward(`💀 Hạ ${enemy.name}! +${goldGain} vàng`);
                    enemy = null;
                    // Spawn next enemy after delay
                    setTimeout(() => {
                        spawnEnemy();
                        isFighting = false;
                        btnFight.disabled = false;
                        btnSummon.disabled = false;
                        btnUpgrade.disabled = false;
                        updateUI();
                    }, 300);
                    updateUI();
                    return;
                }

                // Enemy counter
                let enemyDmg = Math.max(1, enemy.atk - Math.floor(player.totalDef * 0.5) + Math.floor(Math.random() * 5) - 1);
                // Block chance
                if (Math.random() < 0.10) {
                    enemyDmg = Math.floor(enemyDmg * 0.5);
                    log(`🛡️ <b>Chặn đòn!</b> Giảm sát thương.`, 'story-event');
                }
                player.hp -= enemyDmg;
                log(`💢 <b>${enemy.name}</b> phản công: -${enemyDmg} HP`, 'story-combat');

                if (player.hp <= 0) {
                    player.hp = 0;
                    log(`💀 <b>Bạn đã tử trận!</b> Nhấn F5 để chơi lại.`, 'story-death');
                    btnFight.disabled = true;
                    btnSummon.disabled = true;
                    btnUpgrade.disabled = true;
                    isFighting = false;
                    updateUI();
                    return;
                }

                isFighting = false;
                btnFight.disabled = false;
                btnSummon.disabled = false;
                btnUpgrade.disabled = false;
                updateUI();
            }

            // ---------- LEVEL UP ----------
            function checkLevelUp() {
                while (player.xp >= player.xpNext) {
                    player.level++;
                    player.xp -= player.xpNext;
                    player.xpNext = Math.floor(player.xpNext * 1.5) + 30;
                    player.maxHp = Math.floor(player.maxHp * 1.12) + 10;
                    player.hp = player.maxHp;
                    player.maxMp = Math.floor(player.maxMp * 1.10) + 5;
                    player.mp = player.maxMp;
                    player.atk += 2;
                    player.def += 1;
                    log(`⬆️ <b>LÊN CẤP ${player.level}!</b> HP/MP/ATK/DEF tăng!`, 'story-loot');
                    showReward(`🎉 Lên cấp ${player.level}!`);
                    updateUI();
                }
            }

            // ---------- REWARD POPUP ----------
            function showReward(text) {
                rewardPopup.textContent = `🎁 ${text}`;
                rewardPopup.style.display = 'block';
                setTimeout(() => { rewardPopup.style.display = 'none'; }, 2000);
            }

            // ---------- IDLE PROGRESS ----------
            function idleTick() {
                if (isFighting) return;
                if (!enemy) {
                    spawnEnemy();
                }
                // Auto-fight every 3 seconds
                if (enemy && player.heroes.length > 0 && player.hp > 0) {
                    fight();
                }
            }

            // ---------- INIT ----------
            function init() {
                // Start with one hero
                const starter = HERO_TEMPLATES[0];
                player.heroes.push({
                    id: starter.id,
                    name: starter.name,
                    level: 1,
                    equipment: null,
                    xp: 0,
                    xpNext: 30
                });
                player.activeHeroIndex = 0;
                player.gold = 50;
                updateUI();
                renderHeroes();
                spawnEnemy();
                log('🌳 <b>LỰA CHỌN CỦA LINH HỒN</b> - Hãy bảo vệ Cây Thế Giới!', 'story-info');
                log('⚔️ Chiến đấu để nhận vàng và triệu hồi thêm anh hùng.', 'story-narrator');

                // Event listeners
                btnFight.onclick = fight;
                btnSummon.onclick = () => {
                    // Random hero from templates (cost > 0)
                    const available = HERO_TEMPLATES.filter(t => t.cost > 0);
                    const randomHero = available[Math.floor(Math.random() * available.length)];
                    if (randomHero) {
                        addHero(randomHero.id);
                    } else {
                        log('⚠️ Không có anh hùng nào để triệu hồi!', 'story-event');
                    }
                };
                btnUpgrade.onclick = upgradeHero;

                // Idle loop (every 3 seconds)
                if (idleInterval) clearInterval(idleInterval);
                idleInterval = setInterval(idleTick, 3000);
            }

            init();

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                if (idleInterval) clearInterval(idleInterval);
            });
        })();
    </script>
</body>
</html>

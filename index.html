<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HÀNH TRÌNH ANH HÙNG - BẢN NÂNG CẤP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0512;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background-image: radial-gradient(ellipse at 20% 30%, #1a0f2a 0%, #06020a 100%);
            padding: 8px;
        }
        #game-container {
            background: linear-gradient(160deg, #1a1228, #0d0818);
            width: 840px;
            max-width: 100%;
            padding: 18px 20px 22px;
            border-radius: 44px;
            border: 2px solid #8a5aba;
            box-shadow: 0 0 80px #4a2a7a88, inset 0 0 60px #2a1a3a44;
            color: #e4d8f0;
        }
        #title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: #f0d060;
            text-shadow: 0 0 30px #8a6a2a, 0 0 60px #4a3a1a;
            letter-spacing: 2px;
            font-family: 'Times New Roman', serif;
        }
        #subtitle {
            text-align: center;
            color: #a090b0;
            font-size: 0.85rem;
            border-bottom: 1px solid #3a2a5a;
            padding-bottom: 8px;
            margin-bottom: 10px;
            font-style: italic;
        }
        /* ===== SCENE IMAGE (thay thế bằng link ảnh thật) ===== */
        #scene-image {
            width: 100%;
            height: 220px;
            background: #0a0a12;
            border-radius: 28px;
            border: 1px solid #4a3a6a;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4.5rem;
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 50px #00000088;
            transition: background 0.5s;
            position: relative;
            overflow: hidden;
        }
        #scene-image .emoji-bg {
            text-shadow: 0 0 50px #000000ee;
            opacity: 0.95;
            z-index: 2;
        }
        #scene-image .img-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }
        /* ===== STATS ===== */
        #stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            background: #0d081a;
            padding: 6px 14px;
            border-radius: 60px;
            border: 1px solid #3a2a5a;
            margin-bottom: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            justify-content: space-around;
        }
        .stat-item { color: #b0a8c8; }
        .stat-item span { color: #f0e070; }
        .stat-bar {
            display: inline-block;
            width: 60px;
            height: 8px;
            background: #1a1a2a;
            border-radius: 20px;
            overflow: hidden;
            vertical-align: middle;
            margin-left: 4px;
            border: 1px solid #3a3a5a;
        }
        .stat-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #hp-fill { background: #d05050; }
        #mp-fill { background: #5080d0; }
        #xp-fill { background: #d0b040; }
        /* ===== REWARD POPUP ===== */
        #reward-popup {
            background: #1a0f20;
            border: 2px solid #f0d060;
            border-radius: 20px;
            padding: 10px 16px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            color: #f0e070;
            display: none;
            animation: glow 0.8s ease;
            box-shadow: 0 0 30px #f0d06044;
        }
        @keyframes glow {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        /* ===== STORY ===== */
        #story-area {
            background: #08040e;
            border: 1px solid #2a1a4a;
            border-radius: 20px;
            padding: 12px 16px;
            min-height: 110px;
            max-height: 170px;
            overflow-y: auto;
            font-size: 0.92rem;
            line-height: 1.6;
            margin-bottom: 12px;
            color: #d0c8e0;
            box-shadow: inset 0 0 30px #00000066;
            scroll-behavior: smooth;
        }
        #story-area::-webkit-scrollbar { width: 5px; }
        #story-area::-webkit-scrollbar-thumb { background: #4a2a7a; border-radius: 20px; }
        .story-narrator { color: #c8c0d8; }
        .story-choice { color: #90d0d0; cursor: pointer; font-weight: 600; }
        .story-event { color: #f0c070; }
        .story-combat { color: #f07070; }
        .story-loot { color: #f0d060; }
        .story-death { color: #ff4040; font-weight: bold; }
        /* ===== CHOICES ===== */
        #choices-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 4px;
        }
        .choice-btn {
            background: #1a1228;
            border: 1px solid #4a3a6a;
            color: #d0c8e8;
            padding: 12px 6px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            box-shadow: 0 3px 0 #0a0612;
            line-height: 1.3;
        }
        .choice-btn:hover { background: #2a1a3e; border-color: #7a5aaa; transform: scale(1.03); }
        .choice-btn:active { transform: translateY(3px); box-shadow: none; }
        .choice-btn:disabled { opacity: 0.3; pointer-events: none; filter: grayscale(0.6); }
        .choice-btn.special { border-color: #c09040; background: #2a1a0a; }
        .choice-btn.danger { border-color: #c04040; background: #2a0a0a; }
        .choice-btn.hidden { display: none; }
        @media (max-width: 550px) {
            #choices-panel { grid-template-columns: 1fr; }
            #title { font-size: 1.6rem; }
            #scene-image { height: 150px; font-size: 3rem; }
            #stats-row { font-size: 0.7rem; gap: 2px; }
            .stat-bar { width: 40px; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="title">⚔️ HÀNH TRÌNH ANH HÙNG</div>
    <div id="subtitle">— Phiên bản Huyền Thoại —</div>

    <div id="scene-image"><span class="emoji-bg">🏰</span><div class="img-overlay"></div></div>

    <div id="stats-row">
        <div class="stat-item">❤️ HP <span id="hp-text">100/100</span> <span class="stat-bar"><span class="stat-fill" id="hp-fill"></span></span></div>
        <div class="stat-item">🌀 MP <span id="mp-text">40/40</span> <span class="stat-bar"><span class="stat-fill" id="mp-fill"></span></span></div>
        <div class="stat-item">⭐ LV.<span id="level-text">1</span> <span class="stat-bar"><span class="stat-fill" id="xp-fill"></span></span></div>
        <div class="stat-item">🗡️ <span id="atk-text">10</span> 🛡️ <span id="def-text">4</span></div>
        <div class="stat-item">💰 <span id="gold-text">0</span></div>
    </div>

    <div id="reward-popup">🎁 PHẦN THƯỞNG ĐẶC BIỆT!</div>

    <div id="story-area"><div class="story-narrator">🌅 Chào mừng! Hãy bắt đầu cuộc phiêu lưu...</div></div>

    <div id="choices-panel">
        <button class="choice-btn" id="choice1">▶ Lựa chọn 1</button>
        <button class="choice-btn" id="choice2">▶ Lựa chọn 2</button>
    </div>
</div>

<script>
    // ================================================================
    // LIFE IN ADVENTURE STYLE - NÂNG CẤP
    // ================================================================
    (function() {
        // ---------- PLAYER ----------
        let player = {};

        function resetPlayer() {
            player = {
                hp: 100, maxHp: 100,
                mp: 40, maxMp: 40,
                level: 1,
                xp: 0, xpNext: 30,
                atk: 10,
                def: 4,
                gold: 0,
                inventory: [],
                flags: {},
                deaths: 0,
                totalKills: 0
            };
        }
        resetPlayer();

        let gameState = 'story';
        let currentNode = 'start';
        let combatEnemy = null;
        let isProcessing = false;
        let deathStoryIndex = 0;

        // DOM refs
        const storyArea = document.getElementById('story-area');
        const sceneImg = document.getElementById('scene-image');
        const rewardPopup = document.getElementById('reward-popup');
        const choice1 = document.getElementById('choice1');
        const choice2 = document.getElementById('choice2');
        const hpText = document.getElementById('hp-text'); const hpFill = document.getElementById('hp-fill');
        const mpText = document.getElementById('mp-text'); const mpFill = document.getElementById('mp-fill');
        const levelText = document.getElementById('level-text');
        const atkText = document.getElementById('atk-text'); const defText = document.getElementById('def-text');
        const goldText = document.getElementById('gold-text');

        // ---------- HÌNH ẢNH (có thể thay bằng link ảnh thật) ----------
        const sceneImages = {
            'start': '🏰',
            'forest': '🌲',
            'cave': '🕯️',
            'village': '🏘️',
            'castle': '🏯',
            'dragon': '🐉',
            'boss': '👹',
            'shop': '🏪',
            'ruin': '🏛️',
            'beach': '🏖️',
            'combat': '⚔️',
            'victory': '🏆',
            'death1': '💀',
            'death2': '☠️',
            'death3': '🕊️',
            'death4': '🌑',
            'reward': '🎁'
        };

        // Bạn có thể thay thế bằng URL ảnh thật:
        // const realImageURLs = {
        //     'start': 'https://example.com/start.jpg',
        //     'forest': 'https://example.com/forest.jpg',
        //     ...
        // };

        function setScene(key) {
            const emoji = sceneImages[key] || '❓';
            // Nếu có link ảnh thật, bỏ comment dưới đây và comment dòng emoji
            // if (realImageURLs[key]) {
            //     sceneImg.style.backgroundImage = `url('${realImageURLs[key]}')`;
            //     sceneImg.innerHTML = '<div class="img-overlay"></div>';
            // } else {
            //     sceneImg.innerHTML = `<span class="emoji-bg">${emoji}</span><div class="img-overlay"></div>`;
            //     sceneImg.style.backgroundImage = 'none';
            // }
            sceneImg.innerHTML = `<span class="emoji-bg" style="font-size:4.5rem;">${emoji}</span><div class="img-overlay"></div>`;
            sceneImg.style.backgroundImage = 'none';
        }

        // ---------- LOG ----------
        function log(msg, cls = 'story-narrator') {
            const div = document.createElement('div');
            div.className = cls;
            div.innerHTML = msg;
            storyArea.appendChild(div);
            storyArea.scrollTop = storyArea.scrollHeight;
        }

        function clearLog() { storyArea.innerHTML = ''; }

        // ---------- UPDATE UI ----------
        function updateUI() {
            const hpPct = (player.hp / player.maxHp) * 100;
            hpText.textContent = `${Math.floor(player.hp)}/${player.maxHp}`;
            hpFill.style.width = Math.min(100, Math.max(0, hpPct)) + '%';
            const mpPct = (player.mp / player.maxMp) * 100;
            mpText.textContent = `${Math.floor(player.mp)}/${player.maxMp}`;
            mpFill.style.width = Math.min(100, Math.max(0, mpPct)) + '%';
            const xpPct = (player.xp / player.xpNext) * 100;
            levelText.textContent = player.level;
            atkText.textContent = player.atk;
            defText.textContent = player.def;
            goldText.textContent = player.gold;
        }

        // ---------- RANDOM REWARD ----------
        function showRandomReward() {
            const rewards = [
                { text: '💎 +15 Vàng', action: () => { player.gold += 15; } },
                { text: '❤️ +10 HP tối đa', action: () => { player.maxHp += 10; player.hp = Math.min(player.hp + 10, player.maxHp); } },
                { text: '🌀 +5 MP tối đa', action: () => { player.maxMp += 5; player.mp = Math.min(player.mp + 5, player.maxMp); } },
                { text: '⚔️ +2 Sát thương', action: () => { player.atk += 2; } },
                { text: '🛡️ +1 Phòng thủ', action: () => { player.def += 1; } },
                { text: '⭐ +20 XP', action: () => { player.xp += 20; checkLevelUp(); } },
                { text: '💊 Hồi phục 30 HP', action: () => { player.hp = Math.min(player.maxHp, player.hp + 30); } },
                { text: '🎯 +3 ATK và +1 DEF', action: () => { player.atk += 3; player.def += 1; } }
            ];
            const pick = rewards[Math.floor(Math.random() * rewards.length)];
            rewardPopup.textContent = `🎁 PHẦN THƯỞNG: ${pick.text}`;
            rewardPopup.style.display = 'block';
            pick.action();
            updateUI();
            setTimeout(() => { rewardPopup.style.display = 'none'; }, 2500);
        }

        // ---------- LEVEL UP ----------
        function checkLevelUp() {
            while (player.xp >= player.xpNext) {
                player.level++;
                player.xp -= player.xpNext;
                player.xpNext = Math.floor(player.xpNext * 1.5) + 25;
                player.maxHp = Math.floor(player.maxHp * 1.12) + 8;
                player.hp = player.maxHp;
                player.maxMp = Math.floor(player.maxMp * 1.10) + 5;
                player.mp = player.maxMp;
                player.atk += 3;
                player.def += 2;
                log(`⬆️ <b>LÊN CẤP ${player.level}!</b> HP/MP/ATK/DEF tăng!`, 'story-loot');
                // Random thưởng khi lên cấp
                showRandomReward();
                updateUI();
            }
        }

        // ---------- COMBAT ----------
        function startCombat(enemy, nextNodeAfter) {
            combatEnemy = enemy;
            gameState = 'combat';
            setScene('combat');
            log(`⚔️ <b>${enemy.name}</b> xuất hiện! (HP:${enemy.hp} | ATK:${enemy.atk})`, 'story-combat');
            showCombatChoices(nextNodeAfter);
        }

        let combatNextNode = null;

        function showCombatChoices(nextNode) {
            combatNextNode = nextNode || 'village';
            choice1.textContent = '⚔️ Tấn công';
            choice1.className = 'choice-btn danger';
            choice1.onclick = () => combatAction('attack');
            choice2.textContent = '🌀 Kỹ năng (15 MP)';
            choice2.className = 'choice-btn special';
            choice2.onclick = () => combatAction('skill');
            // Add extra buttons
            addExtraCombatButtons();
        }

        function addExtraCombatButtons() {
            let c3 = document.getElementById('choice3');
            if (!c3) {
                c3 = document.createElement('button');
                c3.id = 'choice3';
                c3.className = 'choice-btn';
                document.getElementById('choices-panel').appendChild(c3);
            }
            c3.textContent = '💚 Hồi phục (10 MP)';
            c3.className = 'choice-btn';
            c3.style.display = 'block';
            c3.onclick = () => combatAction('heal');

            let c4 = document.getElementById('choice4');
            if (!c4) {
                c4 = document.createElement('button');
                c4.id = 'choice4';
                c4.className = 'choice-btn';
                document.getElementById('choices-panel').appendChild(c4);
            }
            c4.textContent = '🏃 Rút lui';
            c4.className = 'choice-btn';
            c4.style.display = 'block';
            c4.onclick = () => combatAction('flee');
            // Adjust grid for 4 buttons
            document.getElementById('choices-panel').style.gridTemplateColumns = '1fr 1fr';
        }

        function removeExtraButtons() {
            const c3 = document.getElementById('choice3');
            const c4 = document.getElementById('choice4');
            if (c3) { c3.style.display = 'none'; c3.disabled = false; }
            if (c4) { c4.style.display = 'none'; c4.disabled = false; }
            document.getElementById('choices-panel').style.gridTemplateColumns = '1fr 1fr';
        }

        function combatAction(action) {
            if (isProcessing || gameState !== 'combat' || !combatEnemy) return;
            isProcessing = true;
            setButtonsDisabled(true);

            let dmg = 0;
            let healAmt = 0;

            if (action === 'attack') {
                dmg = Math.max(2, player.atk - Math.floor(combatEnemy.def * 0.4) + Math.floor(Math.random() * 6) - 1);
                combatEnemy.hp -= dmg;
                log(`⚔️ Bạn gây <b>${dmg}</b> sát thương.`, 'story-player');
            } else if (action === 'skill') {
                if (player.mp < 15) {
                    log('🌀 Không đủ MP (cần 15).', 'story-system');
                    isProcessing = false; setButtonsDisabled(false); return;
                }
                player.mp -= 15;
                dmg = Math.max(5, Math.floor(player.atk * 2.3) - Math.floor(combatEnemy.def * 0.3) + Math.floor(Math.random() * 7) - 2);
                combatEnemy.hp -= dmg;
                log(`🌀 <b>Kỹ năng đặc biệt!</b> Gây <b>${dmg}</b> sát thương!`, 'story-event');
            } else if (action === 'heal') {
                if (player.mp < 10) {
                    log('🌀 Không đủ MP để hồi phục (cần 10).', 'story-system');
                    isProcessing = false; setButtonsDisabled(false); return;
                }
                player.mp -= 10;
                healAmt = Math.floor(player.maxHp * 0.3) + 12;
                player.hp = Math.min(player.maxHp, player.hp + healAmt);
                log(`💚 Hồi phục <b>+${healAmt}</b> HP.`, 'story-loot');
            } else if (action === 'flee') {
                if (Math.random() < 0.45) {
                    log('🏃 Bạn rút lui thành công!', 'story-system');
                    combatEnemy = null;
                    gameState = 'story';
                    setScene('start');
                    removeExtraButtons();
                    showChoicesForNode(currentNode);
                    isProcessing = false; setButtonsDisabled(false);
                    return;
                } else {
                    log('❌ Rút lui thất bại!', 'story-combat');
                }
            }

            updateUI();

            // Enemy death
            if (combatEnemy && combatEnemy.hp <= 0) {
                combatEnemy.hp = 0;
                const xpGain = Math.floor(combatEnemy.xp * (0.85 + Math.random() * 0.3));
                const goldGain = Math.floor(Math.random() * (combatEnemy.goldMax - combatEnemy.goldMin + 1)) + combatEnemy.goldMin;
                player.xp += xpGain;
                player.gold += goldGain;
                player.totalKills++;
                log(`💀 <b>${combatEnemy.name}</b> bị hạ! +${xpGain} XP, +${goldGain} Vàng`, 'story-loot');
                // Random reward sau mỗi lần hạ quái
                showRandomReward();
                combatEnemy = null;
                gameState = 'story';
                setScene('victory');
                checkLevelUp();
                removeExtraButtons();
                // Chuyển tiếp cốt truyện
                setTimeout(() => {
                    setScene('start');
                    if (combatNextNode) {
                        showChoicesForNode(combatNextNode);
                    } else {
                        showChoicesForNode('village');
                    }
                }, 400);
                updateUI();
                isProcessing = false; setButtonsDisabled(false);
                return;
            }

            // Enemy counter
            if (combatEnemy) {
                let enemyDmg = Math.max(1, combatEnemy.atk - Math.floor(player.def * 0.5) + Math.floor(Math.random() * 5) - 1);
                player.hp -= enemyDmg;
                log(`💢 <b>${combatEnemy.name}</b> phản công: -${enemyDmg} HP`, 'story-combat');
                if (player.hp <= 0) {
                    player.hp = 0;
                    gameState = 'gameover';
                    handleDeath();
                    return;
                }
                updateUI();
            }

            isProcessing = false;
            setButtonsDisabled(false);
            if (gameState === 'combat') showCombatChoices(combatNextNode);
        }

        // ---------- HỆ THỐNG CHẾT ĐA DẠNG ----------
        function handleDeath() {
            player.deaths++;
            const deathScenes = [
                {
                    text: '💀 Bạn ngã xuống trong rừng tối. Linh hồn bạn bay lên, nhưng một thế lực bí ẩn đưa bạn trở về... với sức mạnh mới!',
                    bonus: () => { player.atk += 2; player.def += 1; }
                },
                {
                    text: '☠️ Bạn bị quái vật nghiền nát. Nhưng từ tro tàn, bạn đứng dậy mạnh mẽ hơn! HP tối đa tăng vĩnh viễn.',
                    bonus: () => { player.maxHp += 15; player.hp = player.maxHp; }
                },
                {
                    text: '🕊️ Bạn chết trong giấc mơ... nhưng tỉnh dậy với một lời nguyền. MP tối đa tăng và nhận được 20 vàng.',
                    bonus: () => { player.maxMp += 8; player.mp = player.maxMp; player.gold += 20; }
                },
                {
                    text: '🌑 Bóng tối nuốt chửng bạn. Một giọng nói vang lên: "Hãy chiến đấu tiếp." Bạn nhận được +3 ATK và +10 HP.',
                    bonus: () => { player.atk += 3; player.hp = Math.min(player.maxHp, player.hp + 10); }
                },
                {
                    text: '💫 Bạn chết nhưng được thần linh cứu giúp. Tất cả chỉ số tăng nhẹ và nhận 30 vàng.',
                    bonus: () => { player.atk += 1; player.def += 1; player.maxHp += 5; player.gold += 30; player.hp = player.maxHp; }
                }
            ];
            const idx = player.deaths % deathScenes.length;
            const scene = deathScenes[idx];
            setScene(`death${idx+1}`);
            clearLog();
            log(`💀 <b>Bạn đã tử trận lần thứ ${player.deaths}.</b>`, 'story-death');
            log(scene.text, 'story-narrator');
            scene.bonus();
            updateUI();
            // Hiện nút chơi lại
            choice1.textContent = '🔄 Sống lại và tiếp tục';
            choice1.className = 'choice-btn special';
            choice1.onclick = () => {
                gameState = 'story';
                setScene('start');
                removeExtraButtons();
                showChoicesForNode('start');
            };
            choice2.style.display = 'none';
            removeExtraButtons();
            setButtonsDisabled(false);
        }

        // ---------- CỐT TRUYỆN ----------
        function showChoicesForNode(nodeId) {
            const node = storyNodes[nodeId];
            if (!node) {
                log('❌ Lỗi kịch bản.', 'story-system');
                return;
            }
            currentNode = nodeId;
            clearLog();
            setScene(node.scene || 'start');
            if (typeof node.text === 'function') {
                log(node.text(), 'story-narrator');
            } else {
                log(node.text, 'story-narrator');
            }
            const choices = node.choices || [];
            if (choices.length >= 1) {
                choice1.style.display = 'block';
                choice1.textContent = choices[0].label;
                choice1.className = choices[0].special ? 'choice-btn special' : 'choice-btn';
                choice1.onclick = () => handleChoice(choices[0]);
            } else {
                choice1.style.display = 'none';
            }
            if (choices.length >= 2) {
                choice2.style.display = 'block';
                choice2.textContent = choices[1].label;
                choice2.className = choices[1].danger ? 'choice-btn danger' : 'choice-btn';
                choice2.onclick = () => handleChoice(choices[1]);
            } else {
                choice2.style.display = 'none';
            }
            removeExtraButtons();
            if (choices.length < 2) choice2.style.display = 'none';
            updateUI();
        }

        function handleChoice(choice) {
            if (isProcessing) return;
            if (choice.condition && !choice.condition()) {
                log('⚠️ Bạn chưa đủ điều kiện.', 'story-system');
                return;
            }
            if (choice.action) choice.action();
            if (choice.next) {
                if (typeof choice.next === 'string') {
                    const nextNode = storyNodes[choice.next];
                    if (nextNode && nextNode.type === 'combat') {
                        const enemy = nextNode.enemy();
                        const nextAfter = nextNode.nextAfter || 'village';
                        startCombat(enemy, nextAfter);
                        return;
                    }
                    showChoicesForNode(choice.next);
                } else if (typeof choice.next === 'function') {
                    const result = choice.next();
                    if (result) showChoicesForNode(result);
                }
            }
        }

        function setButtonsDisabled(state) {
            choice1.disabled = state;
            choice2.disabled = state;
            const c3 = document.getElementById('choice3');
            const c4 = document.getElementById('choice4');
            if (c3) c3.disabled = state;
            if (c4) c4.disabled = state;
        }

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anime Card Brawler - Gacha & Battle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 16px;
        }
        #gameContainer {
            background: #111827;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid #2a3a6a;
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #c8d8ff;
            padding: 8px 16px;
            background: #1a2540;
            border-radius: 40px;
            flex-wrap: wrap;
            gap: 8px;
        }
        #topBar .stat {
            background: #0f172a;
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid #2f4a7a;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #topBar .stat span { color: #ffd966; }

        #mainLayout {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        #sidebar {
            background: #0f172a;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #2a3a5a;
            min-width: 160px;
            flex: 0 0 180px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #sidebar .menu-item {
            padding: 10px 14px;
            border-radius: 16px;
            color: #aabbdd;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-align: center;
        }
        #sidebar .menu-item:hover { background: #1a2540; border-color: #2f4a7a; }
        #sidebar .menu-item.active {
            background: #2a4a7a;
            color: #fff;
            border-color: #4a8aff;
            box-shadow: 0 0 20px rgba(74,138,255,0.2);
        }

        #content {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #battleArea {
            background: #0a1220;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #2a3a5a;
        }
        #battleCanvas {
            width: 100%;
            height: 280px;
            background: #0a1220;
            border-radius: 16px;
            border: 1px solid #2a3a5a;
            cursor: pointer;
        }
        #waveInfo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            color: #aabbdd;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 8px;
        }
        #controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        #controls button {
            background: #2a4a7a;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 4px 0 #0a1a2a;
            flex: 1;
            min-width: 80px;
        }
        #controls button:hover { background: #3a6a9a; transform: translateY(-2px); box-shadow: 0 6px 0 #0a1a2a; }
        #controls button:active { transform: translateY(4px); box-shadow: 0 1px 0 #0a1a2a; }
        #controls button:disabled { opacity: 0.4; transform: translateY(4px); box-shadow: 0 1px 0 #0a1a2a; }

        #teamArea {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 4px;
        }
        .card {
            width: 140px;
            height: 210px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 3px solid #2f4a7a;
            transition: all 0.3s;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-color: #1a2540;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .card:hover { transform: scale(1.05); border-color: #4a8aff; }
        .card.dead { opacity: 0.4; border-color: #6a2a2a; filter: grayscale(0.8); }
        .card .overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 6px 6px;
            color: white;
            text-align: center;
        }
        .card .name { font-weight: bold; font-size: 14px; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
        .card .stats { font-size: 12px; opacity: 0.9; }
        .card .hpBar { background: rgba(0,0,0,0.7); height: 5px; border-radius: 6px; margin: 3px 0; }
        .card .hpBar .fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
        .card .rarity-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #ffd700;
            color: #ffd700;
        }
        .card .card-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        #gachaPanel {
            display: none;
            background: #0f172a;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #2a3a5a;
            margin-top: 8px;
        }
        #gachaPanel.active { display: block; }
        #gachaPanel .gacha-btn {
            background: #4a2a6a;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #1a0a2a;
            transition: all 0.1s;
            margin: 4px;
        }
        #gachaPanel .gacha-btn:active { transform: translateY(6px); box-shadow: 0 1px 0 #1a0a2a; }
        #gachaPanel .gacha-btn:disabled { opacity: 0.4; transform: translateY(4px); box-shadow: 0 2px 0 #1a0a2a; }
        #gachaResult {
            margin-top: 12px;
            min-height: 50px;
            color: #aabbdd;
            text-align: center;
            font-size: 14px;
        }

        #logArea {
            background: #0a1220;
            border-radius: 16px;
            padding: 10px 14px;
            max-height: 80px;
            overflow-y: auto;
            color: #88ccff;
            font-size: 13px;
            border: 1px solid #1a2a4a;
            margin-top: 4px;
        }
        #logArea::-webkit-scrollbar { width: 4px; }
        #logArea::-webkit-scrollbar-thumb { background: #2a4a7a; border-radius: 10px; }

        .floatText {
            position: fixed;
            font-weight: bold;
            font-size: 28px;
            color: #ffd700;
            pointer-events: none;
            animation: floatUp 1.2s forwards;
            z-index: 1000;
            text-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.3); }
        }

        @media (max-width: 700px) {
            #sidebar { flex: 1 1 100%; flex-direction: row; flex-wrap: wrap; justify-content: center; }
            #sidebar .menu-item { padding: 6px 14px; font-size: 13px; }
            .card { width: 110px; height: 180px; }
            .card .card-img { height: 100px; }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <!-- TOP BAR -->
    <div id="topBar">
        <div class="stat">💰 <span id="goldDisplay">200</span></div>
        <div class="stat">💎 <span id="gemDisplay">50</span></div>
        <div class="stat">⚔️ Wave <span id="waveDisplay">1</span></div>
        <div class="stat">🏆 <span id="winDisplay">0</span></div>
    </div>

    <!-- MAIN LAYOUT -->
    <div id="mainLayout">
        <!-- SIDEBAR -->
        <div id="sidebar">
            <div class="menu-item active" data-tab="team">⚔️ Team</div>
            <div class="menu-item" data-tab="gacha">🎲 Gacha</div>
            <div class="menu-item" data-tab="challenges">📜 Challenges</div>
            <div class="menu-item" data-tab="profiles">👤 Profiles</div>
            <div class="menu-item" data-tab="settings">⚙️ Settings</div>
        </div>

        <!-- CONTENT -->
        <div id="content">
            <div id="battleArea">
                <canvas id="battleCanvas" width="900" height="280"></canvas>
                <div id="waveInfo">
                    <span>🌊 Wave <span id="waveNum">1</span></span>
                    <span>👾 Kẻ thù: <span id="enemyCount">0</span></span>
                    <span>⚡ <span id="battleStatus">🟢 Sẵn sàng</span></span>
                </div>
                <div id="controls">
                    <button id="startWaveBtn">⚔️ Bắt đầu Wave</button>
                    <button id="autoBattleBtn">🤖 Tự động</button>
                    <button id="resetBtn">🔄 Reset Wave</button>
                </div>
            </div>

            <div id="teamArea"></div>

            <div id="gachaPanel">
                <div style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;">
                    <button class="gacha-btn" id="gacha1Btn">🎲 Gacha 1x (10 💎)</button>
                    <button class="gacha-btn" id="gacha10Btn">🎰 Gacha 10x (90 💎)</button>
                </div>
                <div id="gachaResult">🎴 Nhấn nút để rút tướng mới!</div>
            </div>

            <div id="logArea">⚔️ Chào mừng! Hãy bắt đầu wave đầu tiên.</div>
        </div>
    </div>
</div>

<script>
// ================================================================
//  ANIME CARD BRAWLER - WITH GACHA & ANIME IMAGES (URL)
// ================================================================

// ==================== 1. CHARACTER DATA WITH ANIME IMAGE URLS ====================
// Ảnh lấy từ nguồn đẹp, chất lượng cao
const CHARACTERS = [
    { id: 'naruto', name: 'Naruto Uzumaki', image: 'https://cdn.myanimelist.net/images/characters/6/138219.jpg', atk: 14, def: 6, hp: 90, maxHp: 90, rarity: 'common', skill: 'Rasengan', skillDmg: 22, element: 'wind', type: 'ninja' },
    { id: 'sasuke', name: 'Sasuke Uchiha', image: 'https://cdn.myanimelist.net/images/characters/4/134330.jpg', atk: 16, def: 5, hp: 85, maxHp: 85, rarity: 'common', skill: 'Chidori', skillDmg: 28, element: 'fire', type: 'shinobi' },
    { id: 'sakura', name: 'Sakura Haruno', image: 'https://cdn.myanimelist.net/images/characters/3/131957.jpg', atk: 12, def: 8, hp: 80, maxHp: 80, rarity: 'common', skill: 'Healing', skillDmg: 18, element: 'earth', type: 'healer' },
    { id: 'luffy', name: 'Monkey D. Luffy', image: 'https://cdn.myanimelist.net/images/characters/6/133743.jpg', atk: 15, def: 7, hp: 100, maxHp: 100, rarity: 'common', skill: 'Gomu Gomu', skillDmg: 25, element: 'water', type: 'pirate' },
    { id: 'zoro', name: 'Roronoa Zoro', image: 'https://cdn.myanimelist.net/images/characters/4/133745.jpg', atk: 18, def: 4, hp: 95, maxHp: 95, rarity: 'common', skill: 'Santoryu', skillDmg: 30, element: 'wind', type: 'swordsman' },
    { id: 'nami', name: 'Nami', image: 'https://cdn.myanimelist.net/images/characters/5/133749.jpg', atk: 11, def: 6, hp: 70, maxHp: 70, rarity: 'common', skill: 'Weather', skillDmg: 20, element: 'lightning', type: 'navigator' },
    { id: 'gojo', name: 'Satoru Gojo', image: 'https://cdn.myanimelist.net/images/characters/17/406810.jpg', atk: 20, def: 8, hp: 110, maxHp: 110, rarity: 'legend', skill: 'Domain', skillDmg: 40, element: 'light', type: 'sorcerer' },
    { id: 'sukuna', name: 'Ryomen Sukuna', image: 'https://cdn.myanimelist.net/images/characters/8/416137.jpg', atk: 22, def: 6, hp: 120, maxHp: 120, rarity: 'legend', skill: 'Malevolent Shrine', skillDmg: 45, element: 'dark', type: 'curse' },
    { id: 'tanjiro', name: 'Tanjiro Kamado', image: 'https://cdn.myanimelist.net/images/characters/12/395587.jpg', atk: 16, def: 8, hp: 95, maxHp: 95, rarity: 'common', skill: 'Hinokami', skillDmg: 26, element: 'fire', type: 'slayer' },
    { id: 'nezuko', name: 'Nezuko Kamado', image: 'https://cdn.myanimelist.net/images/characters/15/395586.jpg', atk: 14, def: 10, hp: 90, maxHp: 90, rarity: 'common', skill: 'Blood Burst', skillDmg: 20, element: 'dark', type: 'demon' },
    { id: 'rengoku', name: 'Kyojuro Rengoku', image: 'https://cdn.myanimelist.net/images/characters/13/435478.jpg', atk: 19, def: 7, hp: 105, maxHp: 105, rarity: 'epic', skill: 'Flame Breathing', skillDmg: 32, element: 'fire', type: 'flame' },
    { id: 'meliodas', name: 'Meliodas', image: 'https://cdn.myanimelist.net/images/characters/12/270151.jpg', atk: 21, def: 9, hp: 115, maxHp: 115, rarity: 'epic', skill: 'Full Counter', skillDmg: 38, element: 'dark', type: 'demon' },
    { id: 'escanor', name: 'Escanor', image: 'https://cdn.myanimelist.net/images/characters/14/322736.jpg', atk: 25, def: 5, hp: 130, maxHp: 130, rarity: 'legend', skill: 'Cruel Sun', skillDmg: 50, element: 'fire', type: 'lion' },
    { id: 'asta', name: 'Asta', image: 'https://cdn.myanimelist.net/images/characters/17/370968.jpg', atk: 17, def: 7, hp: 100, maxHp: 100, rarity: 'common', skill: 'Anti-Magic', skillDmg: 28, element: 'light', type: 'mage' },
    { id: 'midoriya', name: 'Izuku Midoriya', image: 'https://cdn.myanimelist.net/images/characters/17/400096.jpg', atk: 16, def: 6, hp: 95, maxHp: 95, rarity: 'common', skill: 'One For All', skillDmg: 28, element: 'light', type: 'hero' },
    { id: 'bakugo', name: 'Katsuki Bakugo', image: 'https://cdn.myanimelist.net/images/characters/11/400097.jpg', atk: 18, def: 5, hp: 88, maxHp: 88, rarity: 'common', skill: 'Explosion', skillDmg: 30, element: 'fire', type: 'hero' },
];

// ==================== 2. ENEMIES ====================
const ENEMIES = [
    { name: 'Goblin', avatar: '👺', atk: 8, def: 3, hp: 30, maxHp: 30, type: 'normal' },
    { name: 'Skeleton', avatar: '💀', atk: 10, def: 4, hp: 40, maxHp: 40, type: 'normal' },
    { name: 'Shadow', avatar: '👻', atk: 12, def: 5, hp: 50, maxHp: 50, type: 'normal' },
    { name: 'Demon', avatar: '😈', atk: 15, def: 6, hp: 65, maxHp: 65, type: 'elite' },
    { name: 'Boss', avatar: '🐲', atk: 22, def: 10, hp: 150, maxHp: 150, type: 'boss' },
];

// ==================== 3. GAME STATE ====================
const state = {
    gold: 200,
    gems: 50,
    wave: 1,
    wins: 0,
    team: [],
    enemies: [],
    battleLog: [],
    isBattling: false,
    autoBattle: false,
    battleInterval: null,
    particles: [],
    floatingTexts: [],
    currentTab: 'team',
};

// ==================== 4. DOM REFS ====================
const canvas = document.getElementById('battleCanvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 280;

const goldSpan = document.getElementById('goldDisplay');
const gemSpan = document.getElementById('gemDisplay');
const waveSpan = document.getElementById('waveDisplay');
const winSpan = document.getElementById('winDisplay');
const waveNum = document.getElementById('waveNum');
const enemyCount = document.getElementById('enemyCount');
const battleStatus = document.getElementById('battleStatus');
const logDiv = document.getElementById('logArea');
const teamArea = document.getElementById('teamArea');
const gachaPanel = document.getElementById('gachaPanel');
const gachaResult = document.getElementById('gachaResult');
const startBtn = document.getElementById('startWaveBtn');
const autoBtn = document.getElementById('autoBattleBtn');
const resetBtn = document.getElementById('resetBtn');

// ==================== 5. UTILITY ====================
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max+1)); }
function pick(arr) { return arr[randInt(0, arr.length-1)]; }

// ==================== 6. INIT TEAM (3 Common random) ====================
function initTeam() {
    state.team = [];
    const commonPool = CHARACTERS.filter(c => c.rarity === 'common');
    // Nếu không có common thì lấy tất cả
    const pool = commonPool.length >= 3 ? commonPool : CHARACTERS;
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    for (let i = 0; i < 3; i++) {
        const c = shuffled[i % shuffled.length];
        state.team.push({
            ...c,
            hp: c.maxHp,
            maxHp: c.maxHp,
            atk: c.atk + randInt(-2, 4),
            def: c.def + randInt(-1, 3),
        });
    }
    renderTeam();
    updateUI();
}

// ==================== 7. RENDER TEAM (Cards with images) ====================
function renderTeam() {
    teamArea.innerHTML = state.team.map((c, idx) => {
        const hpPercent = (c.hp / c.maxHp) * 100;
        const rarityColor = {
            common: '#aabbdd', rare: '#4a8aff', epic: '#aa66ff', legend: '#ffaa44'
        }[c.rarity] || '#ffffff';
        
        return `
            <div class="card ${c.hp <= 0 ? 'dead' : ''}" data-idx="${idx}" style="border-color: ${rarityColor};">
                <div class="rarity-badge" style="color:${rarityColor}; border-color:${rarityColor};">${c.rarity.toUpperCase()}</div>
                <img class="card-img" src="${c.image}" alt="${c.name}" loading="lazy" 
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="avatar-svg" style="display:none; height:140px; align-items:center; justify-content:center; font-size:48px; background:#1a2540;">${c.name.charAt(0)}</div>
                <div class="overlay">
                    <div class="name">${c.name}</div>
                    <div class="stats">⚔️${c.atk} 🛡️${c.def}</div>
                    <div class="hpBar"><div class="fill" style="width:${hpPercent}%; background:${hpPercent > 50 ? '#4caf50' : hpPercent > 25 ? '#ffaa44' : '#f44336'}"></div></div>
                    <div class="stats">❤️ ${Math.floor(c.hp)}/${c.maxHp}</div>
                </div>
            </div>
        `;
    }).join('');

    teamArea.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.idx);
            const c = state.team[idx];
            if (c) log(`${c.name}: ${c.skill} (${c.skillDmg} dmg) | ${c.type} | ${c.element}`);
        });
    });
}

// ==================== 8. GACHA ====================
function doGacha(count) {
    const cost = count === 1 ? 10 : 90;
    if (state.gems < cost) {
        gachaResult.innerHTML = '❌ Không đủ gem! Hãy kiếm thêm bằng cách đánh wave.';
        return;
    }
    state.gems -= cost;
    const results = [];
    for (let i = 0; i < count; i++) {
        const r = Math.random();
        let rarity;
        if (r < 0.05) rarity = 'legend';
        else if (r < 0.20) rarity = 'epic';
        else if (r < 0.55) rarity = 'rare';
        else rarity = 'common';
        const pool = CHARACTERS.filter(c => c.rarity === rarity);
        const template = pool.length > 0 ? pick(pool) : pick(CHARACTERS);
        const hero = {
            ...template,
            hp: template.maxHp,
            maxHp: template.maxHp,
            atk: template.atk + randInt(-2, 4),
            def: template.def + randInt(-1, 3),
        };
        state.team.push(hero);
        results.push(hero);
    }
    const names = results.map(h => 
        `<span style="color:${ {common:'#aabbdd',rare:'#4a8aff',epic:'#aa66ff',legend:'#ffaa44'}[h.rarity] }">${h.name} (${h.rarity})</span>`
    ).join(', ');
    gachaResult.innerHTML = `🎉 Nhận được: ${names}`;
    addFloatingText(`🎉 +${count} tướng!`, 400, 100, '#ffd700');
    renderTeam();
    updateUI();
}

// ==================== 9. SPAWN ENEMIES ====================
function spawnWave() {
    const wave = state.wave;
    const count = Math.min(2 + Math.floor(wave / 3), 6);
    state.enemies = [];
    for (let i = 0; i < count; i++) {
        let template;
        const r = Math.random();
        if (wave % 10 === 0 && i === 0) {
            template = { ...ENEMIES[4] };
            template.hp = 120 + wave * 5;
            template.maxHp = template.hp;
            template.atk = 18 + wave * 1.2;
            template.def = 6 + wave * 0.5;
            template.name = `Boss Lv.${wave}`;
        } else if (r < 0.2 && wave > 5) {
            template = { ...ENEMIES[3] };
            template.hp = 50 + wave * 3;
            template.maxHp = template.hp;
            template.atk = 12 + wave * 0.8;
            template.def = 4 + wave * 0.4;
        } else {
            template = { ...pick(ENEMIES.slice(0,3)) };
            template.hp = 25 + wave * 2.5;
            template.maxHp = template.hp;
            template.atk = 8 + wave * 0.6;
            template.def = 3 + wave * 0.3;
        }
        state.enemies.push({
            ...template,
            x: 600 + rand(-60, 60) + i * 30,
            y: 80 + rand(-20, 20),
            w: 50,
            h: 60,
            hitFlash: 0,
        });
    }
    enemyCount.textContent = state.enemies.length;
    log(`🌊 Wave ${wave}: ${state.enemies.length} kẻ thù xuất hiện!`);
}

// ==================== 10. BATTLE LOGIC ====================
function battleTurn() {
    if (state.isBattling) return;
    if (state.enemies.length === 0) { finishWave(); return; }
    if (state.team.every(c => c.hp <= 0)) {
        log('💀 Toàn đội đã ngã!');
        battleStatus.textContent = '💀 Thất bại';
        stopBattle();
        return;
    }

    state.isBattling = true;
    battleStatus.textContent = '⚔️ Đang chiến đấu...';

    for (const ally of state.team) {
        if (ally.hp <= 0 || state.enemies.length === 0) continue;
        const target = state.enemies[0];
        let dmg = Math.max(1, ally.atk - target.def + randInt(-2, 5));
        let skillUsed = false;
        if (Math.random() < 0.3) {
            dmg = Math.max(1, Math.floor(ally.skillDmg * (0.8 + Math.random() * 0.4) - target.def * 0.5));
            skillUsed = true;
            log(`🔥 ${ally.name} dùng ${ally.skill} gây ${dmg} sát thương!`);
            addFloatingText(`💥 ${dmg}`, target.x - 20, target.y - 40, '#ff8844');
            spawnParticles(target.x, target.y, '#ffaa44', 12);
        } else {
            log(`⚔️ ${ally.name} tấn công gây ${dmg} sát thương.`);
            addFloatingText(`-${dmg}`, target.x - 20, target.y - 40, '#88ddff');
        }
        target.hp -= dmg;
        target.hitFlash = 8;

        if (target.hp <= 0) {
            const idx = state.enemies.indexOf(target);
            if (idx > -1) {
                state.enemies.splice(idx, 1);
                const reward = 10 + state.wave * 2;
                state.gold += reward;
                state.gems += Math.floor(reward / 3);
                log(`💀 ${target.name} bị đánh bại! +${reward} vàng, +${Math.floor(reward/3)} gem`);
                addFloatingText(`+${reward}💰`, target.x, target.y - 60, '#ffd700');
                spawnParticles(target.x, target.y, '#ff6666', 20);
            }
        }
        updateUI();
        renderTeam();
        enemyCount.textContent = state.enemies.length;
    }

    for (const enemy of state.enemies) {
        if (enemy.hp <= 0) continue;
        const targets = state.team.filter(c => c.hp > 0);
        if (targets.length === 0) break;
        const target = pick(targets);
        const dmg = Math.max(1, enemy.atk - target.def + randInt(-2, 4));
        target.hp -= dmg;
        log(`💢 ${enemy.name} tấn công ${target.name} gây ${dmg} sát thương!`);
        addFloatingText(`-${dmg}`, target.x || 200, target.y || 150, '#ff3333');
        spawnParticles(target.x || 200, target.y || 150, '#ff3333', 8);
        if (target.hp <= 0) log(`💀 ${target.name} đã ngã!`);
        renderTeam();
        updateUI();
    }

    state.isBattling = false;
    battleStatus.textContent = '🟢 Sẵn sàng';

    if (state.enemies.length === 0) finishWave();
    else if (state.team.every(c => c.hp <= 0)) {
        log('💀 Toàn đội đã ngã!');
        battleStatus.textContent = '💀 Thất bại';
        stopBattle();
    }
}

// ==================== 11. FINISH WAVE ====================
function finishWave() {
    state.wave++;
    state.wins++;
    const reward = 20 + state.wave * 5;
    state.gold += reward;
    state.gems += Math.floor(reward / 4);
    log(`🏆 Hoàn thành Wave ${state.wave-1}! +${reward} vàng, +${Math.floor(reward/4)} gem`);
    addFloatingText(`🏆 +${reward}💰`, 400, 100, '#ffd700');
    
    for (const c of state.team) {
        if (c.hp <= 0) c.hp = Math.floor(c.maxHp * 0.5);
        else c.hp = Math.min(c.maxHp, c.hp + 20);
    }
    if (state.wave % 10 === 0) log(`👑 BOSS WAVE ${state.wave} sắp đến!`);
    
    updateUI();
    renderTeam();
    battleStatus.textContent = '✅ Wave hoàn thành!';
    stopBattle();
    if (state.autoBattle) setTimeout(() => startWave(), 1500);
}

// ==================== 12. START / STOP ====================
function startWave() {
    if (state.enemies.length > 0) return;
    if (state.team.every(c => c.hp <= 0)) {
        log('❌ Đội hình đã chết! Hãy reset.');
        return;
    }
    spawnWave();
    battleStatus.textContent = '⚔️ Chiến đấu!';
    if (state.autoBattle) {
        if (state.battleInterval) clearInterval(state.battleInterval);
        state.battleInterval = setInterval(() => {
            if (state.enemies.length === 0 || state.team.every(c => c.hp <= 0)) {
                if (state.enemies.length === 0) finishWave();
                else stopBattle();
                return;
            }
            battleTurn();
        }, 1200);
    }
    updateUI();
}

function stopBattle() {
    if (state.battleInterval) {
        clearInterval(state.battleInterval);
        state.battleInterval = null;
    }
    state.isBattling = false;
    battleStatus.textContent = '🟢 Sẵn sàng';
}

// ==================== 13. RESET (chỉ về Wave 1) ====================
function resetGame() {
    stopBattle();
    state.wave = 1;
    state.wins = 0;
    state.gold = 200;
    state.gems = 50;
    state.enemies = [];
    state.battleLog = [];
    state.isBattling = false;
    state.autoBattle = false;
    state.particles = [];
    autoBtn.textContent = '🤖 Tự động';
    // Hồi sinh toàn bộ team
    for (const c of state.team) {
        c.hp = c.maxHp;
    }
    log('🔄 Đã reset về Wave 1!');
    battleStatus.textContent = '🟢 Sẵn sàng';
    updateUI();
    renderTeam();
}

// ==================== 14. PARTICLES ====================
function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
        state.particles.push({
            x: x + rand(-20, 20),
            y: y + rand(-20, 20),
            vx: rand(-3, 3),
            vy: rand(-4, 1),
            size: rand(2, 6),
            life: rand(20, 40),
            maxLife: 40,
            color: color,
        });
    }
}

// ==================== 15. RENDER LOOP (Canvas) ====================
function render() {
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createRadialGradient(450, 140, 50, 450, 140, 400);
    grad.addColorStop(0, '#1a2a4a');
    grad.addColorStop(0.7, '#0a1520');
    grad.addColorStop(1, '#050a10');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#1a2a3a';
    ctx.fillRect(0, 230, W, 4);

    state.enemies.forEach(e => {
        if (e.hitFlash > 0) { ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 30; }
        ctx.font = '44px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#fff';
        ctx.fillText(e.avatar, e.x, e.y + 20);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffdddd';
        ctx.font = '13px sans-serif';
        ctx.fillText(`${e.name} ❤️${Math.floor(e.hp)}`, e.x, e.y + 48);
        ctx.fillStyle = '#222';
        ctx.fillRect(e.x - 28, e.y + 52, 56, 6);
        const hpPct = Math.max(0, e.hp / e.maxHp);
        ctx.fillStyle = hpPct > 0.5 ? '#4caf50' : (hpPct > 0.25 ? '#ffaa44' : '#f44336');
        ctx.fillRect(e.x - 28, e.y + 52, 56 * hpPct, 6);
    });

    state.team.forEach((c, i) => {
        if (c.hp <= 0) return;
        const x = 70 + i * 110;
        const y = 60 + i * 8;
        // Draw avatar image on canvas
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.src = c.image;
        img.onload = () => {
            ctx.drawImage(img, x - 30, y - 20, 60, 60);
        };
        img.onerror = () => {
            ctx.font = '30px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.fillText(c.name.charAt(0), x, y + 10);
        };
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#88ddff';
        ctx.fillText(c.name, x, y + 56);
        ctx.fillStyle = '#222';
        ctx.fillRect(x - 22, y + 60, 44, 5);
        const hpPct = Math.max(0, c.hp / c.maxHp);
        ctx.fillStyle = hpPct > 0.5 ? '#4caf50' : (hpPct > 0.25 ? '#ffaa44' : '#f44336');
        ctx.fillRect(x - 22, y + 60, 44 * hpPct, 5);
    });

    state.particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.font = 'bold 26px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,200,100,0.12)';
    ctx.fillText('⚔️ VS ⚔️', 400, 120);

    for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life--;
        if (p.life <= 0) state.particles.splice(i, 1);
    }

    requestAnimationFrame(render);
}

// ==================== 16. UI UPDATE ====================
function updateUI() {
    goldSpan.textContent = state.gold;
    gemSpan.textContent = state.gems;
    waveSpan.textContent = state.wave;
    winSpan.textContent = state.wins;
    waveNum.textContent = state.wave;
    enemyCount.textContent = state.enemies.length;
}

// ==================== 17. FLOATING TEXT ====================
function addFloatingText(text, x, y, color = '#ffd700') {
    const el = document.createElement('div');
    el.className = 'floatText';
    el.textContent = text;
    el.style.left = (x + rand(-20, 20)) + 'px';
    el.style.top = (y + rand(-20, 20)) + 'px';
    el.style.color = color;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
}

// ==================== 18. LOG ====================
function log(msg) {
    state.battleLog.push('⚔️ ' + msg);
    if (state.battleLog.length > 30) state.battleLog.shift();
    logDiv.innerHTML = state.battleLog.slice(-8).join('<br>');
    logDiv.scrollTop = logDiv.scrollHeight;
}

// ==================== 19. TAB SWITCHING ====================
function switchTab(tab) {
    state.currentTab = tab;
    document.querySelectorAll('#sidebar .menu-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`#sidebar .menu-item[data-tab="${tab}"]`)?.classList.add('active');
    if (tab === 'gacha') {
        gachaPanel.classList.add('active');
    } else {
        gachaPanel.classList.remove('active');
    }
}

// ==================== 20. EVENT LISTENERS ====================
startBtn.addEventListener('click', startWave);
resetBtn.addEventListener('click', resetGame);

autoBtn.addEventListener('click', () => {
    state.autoBattle = !state.autoBattle;
    autoBtn.textContent = state.autoBattle ? '⏹️ Dừng auto' : '🤖 Tự động';
    if (state.autoBattle) {
        if (state.enemies.length === 0) startWave();
        else {
            state.battleInterval = setInterval(() => {
                if (state.enemies.length === 0) finishWave();
                else battleTurn();
            }, 1200);
        }
    } else stopBattle();
});

canvas.addEventListener('click', () => {
    if (!state.autoBattle && state.enemies.length > 0) battleTurn();
});

document.getElementById('gacha1Btn').addEventListener('click', () => doGacha(1));
document.getElementById('gacha10Btn').addEventListener('click', () => doGacha(10));

document.querySelectorAll('#sidebar .menu-item').forEach(el => {
    el.addEventListener('click', () => {
        const tab = el.dataset.tab;
        switchTab(tab);
    });
});

// ==================== 21. START ====================
initTeam();
render();
updateUI();
log('🎮 Anime Card Brawler đã sẵn sàng!');
log('📌 Nhấn "Bắt đầu Wave" để chiến đấu, "Gacha" để rút tướng mới.');
console.log('Team:', state.team);
</script>
